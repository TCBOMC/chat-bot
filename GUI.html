  <meta charset="UTF-8">
  <title>Stream Chat Demo</title>
  <style>
  @font-face {
    font-family: 'NotoSans';
    src: url('./fonts/Noto Sans SC (TrueType).otf') format('opentype'),
         url('./fonts/Noto Sans SC Medium (TrueType).otf') format('opentype'),
		 url('./fonts/NotoSansSC-VF.ttf') format('truetype');
  }
  /*@font-face {
    font-family: 'segoeui';
    src: url('./fonts/segoeui_0.ttf') format('truetype'),
		 url('./fonts/segoeuib_0.ttf') format('truetype'),
		 url('./fonts/segoeuii_0.ttf') format('truetype'),
		 url('./fonts/segoeuil_0.ttf') format('truetype'),
		 url('./fonts/segoeuisl_0.ttf') format('truetype'),
		 url('./fonts/segoeuiz_0.ttf') format('truetype'),
		 url('./fonts/seguibl_0.ttf') format('truetype'),
		 url('./fonts/seguibli_0.ttf') format('truetype'),
		 url('./fonts/seguiemj_0.ttf') format('truetype'),
		 url('./fonts/seguili_0.ttf') format('truetype'),
		 url('./fonts/seguisb_0.ttf') format('truetype'),
		 url('./fonts/seguisbi_0.ttf') format('truetype'),
		 url('./fonts/seguisli_0.ttf') format('truetype');
  }*/
  @font-face {
    font-family: 'Segoe UI Symbol';
    src: url('./fonts/seguisym_0.ttf') format('truetype');
  }
  
  body {
    font-family: 'NotoSans', 'segoeui', 'Segoe UI Emoji', 'Segoe UI Symbol', Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
  }

  /* 侧边栏动画过渡 */
.sidebar {
  width: 220px;
  background-color: #f9f9f9;
  border-right: 1px solid #ccc;
  display: flex;
  flex-direction: column;
  transition: width 0.3s;
  overflow: hidden;
}

.sidebar h3 {
  margin: 10px;
  text-align: center;
}

/* 左倾 30 度再回正 */
@keyframes wiggle-left {
  0% { transform: rotate(0deg); }
  30% { transform: rotate(-30deg); }
  60% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

/* 右倾 30 度再回正 */
@keyframes wiggle-right {
  0% { transform: rotate(0deg); }
  30% { transform: rotate(30deg); }
  60% { transform: rotate(-10deg); }
  100% { transform: rotate(0deg); }
}

/* 应用到按钮 */
#toggleSidebarBtn.wiggle-left {
  animation: wiggle-left 0.4s ease;
}

#toggleSidebarBtn.wiggle-right {
  animation: wiggle-right 0.4s ease;
}

#toggleSidebarBtn{
  margin: 5px auto 0 auto;
}

.sidebar.collapsed {
  width: 50px;
}

.sidebar.collapsed #newSessionBtn {
  width: 30px !important;
  height: 30px !important;
  border-radius: 8px;
  font-size: 16px;
  text-align: center;
  padding: 0;
  margin: 5px auto 0 auto !important;
  transition: width 0.3s ease, height 0.3s ease; /* 收起动画 */
}

/* 关键：隐藏所有不需要的元素 */
.sidebar.collapsed h3,
.sidebar.collapsed .button-group,
.sidebar.collapsed .session-list,
.sidebar.collapsed #clearAllBtn,
.sidebar.collapsed .session-item,
.sidebar.collapsed .button-group button,
.sidebar.collapsed #currentSessionTitle,
.sidebar.collapsed .history-session-header {  /* 添加这一行 */
  display: none !important;
}

/* 确保开关按钮和新建会话按钮显示 */
.sidebar.collapsed .sidebar-header,
.sidebar.collapsed #toggleSidebarBtn,
.sidebar.collapsed #newSessionBtn {
  display: block !important;
}

.sidebar.collapsed #toggleSidebarBtn{
  margin-top: 5px;
}

/* 调整开关按钮位置 */
.sidebar.collapsed .sidebar-header {
  display: flex !important;
  justify-content: center !important;
  padding: 5px 0 !important;
}

#currentSessionTitle {
  margin: 0;
  text-align: left; /* 改为左对齐 */
  white-space: nowrap; /* 确保单行显示 */
  overflow: hidden; /* 隐藏溢出内容 */
  text-overflow: ellipsis; /* 溢出时显示省略号 */
  flex: 1; /* 占据可用空间 */
  padding-right: 10px; /* 右侧留出空间 */
  font-size: 16px; /* 调整字体大小 */
}

/* 调整侧边栏头部布局 */
.sidebar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px;
  flex-shrink: 0;
  margin-bottom: 0px; /* 添加底部间距 */
}

/* 新建会话按钮样式 */
#newSessionBtn {
  width: calc(100% - 10px);
  margin: -5px auto 0px auto;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background-color: #fff;
  cursor: pointer;
  transition: width 0.05s ease, height 0.05s ease; /* 展开动画 */
  white-space: nowrap;
  overflow: hidden;
  font-size: 16px;
}
#newSessionBtn:hover {
  background-color: #efefef;
}

/* 清空按钮组放到历史会话标签上方 */
.button-group {
  display: flex;
  justify-content: space-between;
  gap: 5px;
  margin: 5px;
}
.button-group button {
  flex: 1;
  height: 36px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background-color: #fff;
  cursor: pointer;
}
.button-group button:hover {
  background-color: #efefef;
}

.session-item {
  position: relative;
  margin-bottom: 5px;
}

/* 会话按钮 */
.session-btn {
    width: calc(100% - 10px);
    height: 30px;
    padding: 6px;
    margin: 0 5px;
    border: none;
    border-radius: 6px;
    background-color: #f9f9f9;
    text-align: left;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
    position: relative; /* 为绝对定位的⋮按钮提供参考 */
}

/* 文本部分 - 确保占满可用空间 */
.session-btn .session-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 20px; /* 为⋮按钮留出空间 */
}

.session-btn:hover {
  background-color: #efefef;
}

.session-btn.active {
  background-color: #c7c7c7;
}
/* 会话按钮激活状态 */
.session-btn.active {
    background-color: #c7c7c7 !important; /* 使用!important确保覆盖其他样式 */
}

/* ⋮ 按钮 */
.menu-btn {
  position: absolute;
  right: 2px;
  background: "transparent"; /* 添加背景色 */
  border-radius: 6px;   /* 圆角 */
  padding: 5px 8px;         /* 内边距扩大点击区域 */
  cursor: pointer;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  font-size: 16px;
  width: 26px;          /* 设置按钮宽度 */
  height: 26px;         /* 设置按钮高度 */
}

/* 时间标签样式 */
.time-label {
  font-size: 12px;        /* 调小文字 */
  color: #666;            /* 可以让颜色稍微淡一点 */
  margin: 5px 0;          /* 上下间距 */
  font-weight: normal;    /* 如果需要，可以不要加粗 */
  padding-left: 6px;     /* 左边距 */
}

.session-btn .menu-btn {
    position: absolute;
    right: 2px;
    background: none;
    border: none;
    cursor: pointer;
    display: none;
    font-size: 16px;
	font-weight: bold;
	width: 26px;
    height: 26px;
    display: flex;            /* 变为 flex 容器 */
    justify-content: center;  /* 水平居中 */
    align-items: center;      /* 垂直居中 */
    border-radius: 6px;
	box-sizing: border-box; /* 关键：加上这行 */
	padding-top: 3px;
	/*padding-left: 8px;*/
}

.session-btn .menu-btn:hover {
    padding-top: 2px; /* ← 这会让文本下移 */
    background-color: #ffffff;
    border: 1px solid #ccc; /* 不会影响居中 */
}

.session-item:hover .menu-btn {
  background-color: "transparent"; /* 悬停时背景色 */
}

/* 保持原样的⋮字符居中 */
.menu-btn span {
  padding-top: 2px;
  display: inline-block;
  font-size: 16px;
  color: #333;
  vertical-align: middle;
}

/* 下拉菜单 */
.menu {
  display: none;
  position: absolute;
  top: 100%; /* 按钮正下方 */
  right: 0;
  background-color: #fff;
  border: 1px solid #ccc;
  border-radius: 6px;
  z-index: 10;
  min-width: 80px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  overflow: hidden; /* 新增：确保内部元素不会破坏圆角 */
}

.menu div {
  padding: 5px 10px;
  cursor: pointer;
}

.menu div:hover {
  background-color: #efefef;
}

/* 下拉菜单中的删除项悬停样式 */
.menu div.delete-item:hover {
    background-color: #ff4444 !important; /* 红色背景 */
    color: white !important;              /* 白色文字 */
}
/* 清空菜单项悬浮红色 */
.clear-item:hover {
  background-color: #f44336 !important; /* 红色 */
  color: white !important;
}
  /* 右侧当前会话栏 */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* 历史记录 */
  #chatCanvas {
    flex: 1;
    overflow-y: auto;
    padding: 10px 15%;
    background-color: #fff;
  }
  
  /* 消息容器，给按钮容器提供定位参考 */
.message {
  display: flex;
  width: 100%;
  /* position: relative;*/
  margin-bottom: 40px;
}

/* 容器样式 */
.message-container {
  position: relative;           /* 让按钮相对它定位 */
  display: flex;
  flex-direction: column;       /* 竖直排列：先标签后消息框 */
  align-items: flex-start;      /* 默认左对齐 */
  max-width: 100%;
  width: fit-content;
}

/* 用户消息：内层靠右，这样标签和消息框都贴右边 */
.message.user .message-container {
  align-items: flex-end;
}

/* 角色标签样式 */
.role-label {
  font-weight: bold;
  margin-bottom: 5px;
  /* text-transform: capitalize;*/
}

/* 控制 .message-content 内的段落和换行 */
.message-content {
  border-radius: 15px;
  padding: 10px;
  font-size: 14px;
  max-width: 100%;
  word-wrap: break-word;
  white-space: pre-line; /* 处理换行符 */
  width: fit-content;
  line-height: 1.4;  /* 控制行高，避免行间空白 */
}

/* 移除段落元素 <p> 的上下边距 */
.message-content p {
  margin: 0; /* 去除段落的默认 margin */
  padding: 0; /* 去除段落的默认 padding */
}

/* 处理列表的缩进 */
.message-content ul,
.message-content ol {
  padding-left: 20px; /* 调整列表项的缩进 */
  margin: 0;  /* 移除默认的外边距 */
}

/* 控制代码块的缩进 */
.message-content pre {
  white-space: pre-wrap; /* 保证代码块的内容不会溢出 */
  word-wrap: break-word;
  margin: 0;  /* 移除代码块的默认外边距 */
}

/* 控制引用块的样式 */
.message-content blockquote {
  margin: 0;
  padding-left: 10px;
  border-left: 2px solid #ccc;
}

/* 用户消息的角色标签和消息框颜色 */
.message.user .role-label {
  text-align: right;
  width: 100%;
  color: #0056b3; /* 用户标签颜色（例如蓝色） */
}

.message.user .message-content {
  background-color: #cce5ff; /* 用户消息框颜色（浅蓝色） */
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

<body>

<!-- 左侧历史会话栏 -->
<div class="sidebar">

  <!-- 在 sidebar 内右上角添加开关按钮 -->
  <div class="sidebar-header" style="display:flex; justify-content:space-between; align-items:center;">
    <h3 id="currentSessionTitle">当前会话：会话 1</h3>
    <button id="toggleSidebarBtn" class="circle-btn" style="width:30px;height:30px;border-radius:8px;">≡</button>
  </div>

  <!-- 清空按钮组放在历史会话标题上方 -->
  <div class="button-group">
    <button id="clearCurrentBtn" style="display:none;">清空会话</button>
  </div>

  <!-- 新建会话按钮 -->
  <button id="newSessionBtn">📝 新建会话</button>

  <!-- 历史会话列表 -->
  <div class="history-session-header" style="margin:10px 5px 5px 5px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;white-space: nowrap;overflow: hidden;text-overflow: ellipsis;">
    <span>历史会话：</span>
    <button id="clearAllBtn" style="width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;font-size:16px;margin-bottom:5px;border: 1px solid #ccc;" 
            onmouseover="this.style.backgroundColor='red'" 
            onmouseout="this.style.backgroundColor=''" 
            onclick="handleClearAllSessions()">🗑</button>
  </div>
  <div class="session-list" id="sessionList">
    <!-- Sessions will be loaded here -->
  </div>
</div>

<!-- 右侧当前会话 -->
<div class="chat-container">
  <div id="chatCanvas"></div>

  <div class="bottom-input-wrapper">
    <div class="bottom-input">
      <!-- 上方输入框 -->
      <textarea id="userInput" placeholder="Enter your message" oninput="autoResize(this)"></textarea>
      
      <!-- 底部按钮栏 -->
      <div class="input-buttons">
        <!-- 左侧按钮组：设置 + 模式选择器 -->
        <div class="left-actions">
          <button id="settingsBtn" class="circle-btn">⚙️</button>
        
          <!-- 模式选择器（按钮即菜单底部那一项） -->
          <div class="mode-selector-wrapper">
            <div id="modeMenu" class="mode-menu collapsed" role="listbox" aria-expanded="false">
              <!-- 由 JS 动态填充：上方是其它模式，最下方是当前模式（触发按钮） -->
            </div>
          </div>
        </div>
        
        <!-- 右侧发送按钮 -->
        <button id="sendBtn" class="circle-btn">🠕</button>
      </div>
    </div>
  </div>
  
  <!-- 设置菜单 -->
  <div class="controls" id="settingsMenu">
    <label for="userId">ID:</label>
    <input type="text" id="userId" placeholder="Fetching IP...">
    <label for="apiSelect">选择API:</label>
    <select id="apiSelect">
	  <option value="腾讯">腾讯</option>
      <option value="百度">百度</option>
      <option value="KIMI">KIMI</option>
      <option value="阿里">阿里</option>
      <option value="DeepSeek">DeepSeek</option>
	  <option value="荔枝">荔枝</option>
    </select>
    <label for="backendUrl">后端URL:</label>
    <input type="text" id="backendUrl" value="http://127.0.0.1:5000/chat">
  </div>
</div>

<script>
let chatHistory = [];       // 当前会话历史
let currentSessionId = null;
let sessionCount = 1;
let currentRole = null;           // 当前正在流式的角色
let currentBuffer = "";           // 当前角色消息缓冲
let currentContentDiv = null;     // 当前角色 DOM 容器

// 创建 Tooltip 元素
const tooltip = document.createElement('div');
tooltip.className = 'tooltip';
document.body.appendChild(tooltip);

// 侧边栏展开/折叠切换逻辑
const sidebar = document.querySelector('.sidebar');
const toggleBtn = document.getElementById('toggleSidebarBtn');
const newSessionBtn = document.getElementById('newSessionBtn');

toggleBtn.addEventListener('click', () => {
  const isCollapsed = sidebar.classList.toggle('collapsed');

  // 设置按钮文字
  if (isCollapsed) {
    newSessionBtn.innerText = '📝';
    toggleBtn.classList.add('wiggle-right'); // 收起时向右晃
  } else {
    newSessionBtn.innerText = '📝 新建会话';
    toggleBtn.classList.add('wiggle-left');  // 展开时向左晃
  }

  // 动画结束后移除 class，保证下次还能触发
  toggleBtn.addEventListener('animationend', () => {
      toggleBtn.classList.remove('wiggle-left', 'wiggle-right');
    }, { once: true });
  });

// 自动调整输入框高度
function autoResize(textarea) {
  textarea.style.height = 'auto';
  const maxHeight = parseFloat(getComputedStyle(textarea).maxHeight);
  textarea.style.height = Math.min(textarea.scrollHeight, maxHeight) + 'px';
}

// 模式列表与状态
const modes = ["情感咨询", "日常聊天", "自动对话", "角色扮演", "助手"];
const ITEM_H = 30;

const modeMenu = document.getElementById('modeMenu');
let currentMode = "情感咨询";

// 渲染菜单：上方是其它模式，最下方是当前模式（触发按钮）
function renderModeMenu() {
  modeMenu.innerHTML = "";

  const others = modes.filter(m => m !== currentMode);
  // 先放其它模式（上方）
  others.forEach(m => {
    const b = document.createElement('button');
    b.type = "button";
    b.dataset.mode = m;
    b.textContent = m;
    b.addEventListener('click', onSelectMode);
    modeMenu.appendChild(b);
  });

  // 再放当前模式（最下方，可点击展开/收起）
  const current = document.createElement('button');
  current.type = "button";
  current.dataset.mode = currentMode;
  current.textContent = currentMode + " ▲";
  current.classList.add('is-current');
  current.addEventListener('click', toggleMenu);
  modeMenu.appendChild(current);

  // 设置展开高度（项数 * 30px）
  const totalItems = others.length + 1; // 包含当前模式
  modeMenu.style.setProperty('--expanded-height', (ITEM_H * totalItems) + 'px');
}

// 切换展开/收起（仅当点击当前模式按钮）
function toggleMenu(e) {
  e.stopPropagation();
  const expanded = !modeMenu.classList.contains('expanded');
  modeMenu.classList.toggle('expanded', expanded);
  modeMenu.classList.toggle('collapsed', !expanded);
  modeMenu.setAttribute('aria-expanded', expanded ? 'true' : 'false');
}

// 选择其它模式：更新选中并收起
function onSelectMode(e) {
  e.stopPropagation();
  const selected = e.currentTarget.dataset.mode;
  if (selected && selected !== currentMode) {
    currentMode = selected;
    renderModeMenu();
  }
  modeMenu.classList.remove('expanded');
  modeMenu.classList.add('collapsed');
  modeMenu.setAttribute('aria-expanded', 'false');
}

// 点击外部区域时收起
document.addEventListener('click', (e) => {
  if (!modeMenu.contains(e.target)) {
    modeMenu.classList.remove('expanded');
    modeMenu.classList.add('collapsed');
    modeMenu.setAttribute('aria-expanded', 'false');
  }
});

// 初始化
renderModeMenu();
modeMenu.classList.add('collapsed');
modeMenu.setAttribute('aria-expanded', 'false');

// 切换设置菜单显示
function toggleSettings(event) {
  const menu = document.getElementById('settingsMenu');
  if (menu.style.display === 'grid') {
    menu.style.display = 'none';
  } else {
    menu.style.display = 'grid';
    // 阻止事件冒泡，防止立即触发document的点击事件
    event.stopPropagation();
  }
}

// 检查名称是否重复，返回 true 表示重名
function isDuplicateSessionName(name, excludeId = null) {
  const buttons = document.querySelectorAll('.session-btn');
  for (const btn of buttons) {
    const id = btn.dataset.sessionId;
    const span = btn.querySelector('.session-name');
    if (span && span.textContent === name && id !== excludeId) {
      return true;
    }
  }
  return false;
}

// 点击页面任意位置关闭菜单
document.addEventListener('click', function(event) {
  const menu = document.getElementById('settingsMenu');
  if (menu.style.display === 'grid') {
    menu.style.display = 'none';
  }
});

// 阻止菜单内部的点击事件冒泡到document
document.getElementById('settingsMenu').addEventListener('click', function(event) {
  event.stopPropagation();
});

// 初始化事件
document.getElementById('settingsBtn').addEventListener('click', toggleSettings);
// 发送按钮事件绑定
document.getElementById('sendBtn').addEventListener('click', sendMessage);

// 获取 localStorage 会话历史
function loadSessionFromStorage(sessionId) {
  const stored = localStorage.getItem('session_' + sessionId);
  if (!stored) return [];
  
  try {
    const sessionData = JSON.parse(stored);
    // 清洗会话名称（移除可能混入的⋮符号）
    if (sessionData.name) {
      sessionData.name = sessionData.name.replace(/[⋮⋯]/g, '').trim();
    }
    return sessionData.history || [];
  } catch (e) {
    console.error('解析会话数据出错:', e);
    return [];
  }
}

// 获取会话名称
function getSessionName(sessionId) {
  const stored = localStorage.getItem('session_' + sessionId);
  return stored ? JSON.parse(stored).name : '会话 ' + sessionId;
}

function updateSessionListOrder() {
  const sessionList = document.getElementById('sessionList');
  const buttons = Array.from(sessionList.querySelectorAll('.session-btn'));

  // 获取所有按钮对应的 session 数据
  const sessions = buttons.map(btn => {
    const id = btn.dataset.sessionId;
    const stored = localStorage.getItem('session_' + id);
    if (!stored) return null;
    try {
      return JSON.parse(stored);
    } catch (e) {
      return null;
    }
  }).filter(Boolean);

  // 按 updatedAt 排序（新 → 旧）
  sessions.sort((a, b) => b.updatedAt - a.updatedAt);

  // 按时间段分组
  const now = new Date();
  const grouped = {}; // key: 标签名, value: session 数组

  sessions.forEach(session => {
    const updated = new Date(session.updatedAt);
    const diff = now - updated;
    let label = '';

    const oneDay = 24 * 60 * 60 * 1000;
    const oneWeek = oneDay * 7;

    if (diff < oneDay && updated.getDate() === now.getDate()) {
      label = '今天';
    } else if (diff < 2 * oneDay && updated.getDate() === now.getDate() - 1) {
      label = '昨天';
    } else if (diff < oneWeek && updated.getTime() > now.getTime() - oneWeek) {
      label = '本周';
    } else if (updated.getMonth() === now.getMonth() && updated.getFullYear() === now.getFullYear()) {
      label = '本月';
    } else if (updated.getFullYear() === now.getFullYear()) {
      label = '今年';
    } else {
      const yearsAgo = now.getFullYear() - updated.getFullYear();
      label = yearsAgo + '年前';
    }

    if (!grouped[label]) grouped[label] = [];
    grouped[label].push(session);
  });

  // 按时间顺序展示标签
  const labelOrder = ['今天','昨天','本周','本月','今年'];
  const extraYears = Object.keys(grouped).filter(k => !labelOrder.includes(k)).sort((a,b)=>parseInt(a)-parseInt(b));
  const allLabels = [...labelOrder, ...extraYears];

  // 清空列表重新渲染
  sessionList.innerHTML = '';
  allLabels.forEach(label => {
    if (!grouped[label]) return; // 没有对应会话则跳过
    // 添加时间标签
    const labelDiv = document.createElement('div');
    labelDiv.className = 'time-label';  // 应用样式
    labelDiv.textContent = label;
    sessionList.appendChild(labelDiv);

    // 添加对应会话按钮
    grouped[label].forEach(session => {
      const item = createSessionButton(session.name, session.id);
      sessionList.appendChild(item);
    });
  });

  // 保持当前 active 会话
  const activeBtn = sessionList.querySelector(`.session-btn[data-session-id="${currentSessionId}"]`);
  if (activeBtn) activeBtn.classList.add('active');
}


// 保存当前会话到 localStorage（只有有内容时才保存）
function saveCurrentSession() {
  if (currentSessionId && chatHistory.length > 0) {
    // 从按钮的文本内容中获取干净的名称（确保不包含⋮符号）
    const sessionBtn = document.querySelector(`.session-btn[data-session-id="${currentSessionId}"]`);
    let sessionName = '会话 1'; // 默认值
    
    if (sessionBtn) {
      // 从专门的名称元素获取或从按钮的第一个子节点获取
      const nameElement = sessionBtn.querySelector('.session-name') || 
                         (sessionBtn.childNodes[0].nodeType === Node.TEXT_NODE ? 
                          { textContent: sessionBtn.childNodes[0].textContent } : null);
      if (nameElement) {
        sessionName = nameElement.textContent.trim();
      }
    }
    
    const sessionData = {
      id: currentSessionId,
      name: sessionName, // 使用清洗后的名称
      history: chatHistory,
      updatedAt: Date.now()
    };
    localStorage.setItem('session_' + currentSessionId, JSON.stringify(sessionData));
    localStorage.setItem('lastSession', currentSessionId);
	
	// ✅ 保存后更新按钮顺序
    updateSessionListOrder();
  }
}

// 检查会话是否为空
function isSessionEmpty(sessionId) {
  const stored = localStorage.getItem('session_' + sessionId);
  if (!stored) return true;
  try {
    const sessionData = JSON.parse(stored);
    return sessionData.history.length === 0;
  } catch (e) {
    return true;
  }
}

// 创建按钮容器
function createButtonContainer(role, content) {
  const buttonContainer = document.createElement('div');
  buttonContainer.className = 'button-container';

  if (role === 'user') {
    const copyBtn = createButton('📄', (e) => copyMessage(content, e.currentTarget));

    const editBtn = createButton('📝', (e) => {
      // 通过当前按钮找到对应的消息容器
      const msgElement = e.currentTarget.closest('.message');
      editMessage(msgElement);
    });

    buttonContainer.appendChild(copyBtn);
    buttonContainer.appendChild(editBtn);

  } else if (role === 'assistant') {
    const copyBtn = createButton('📄', (e) => copyMessage(content, e.currentTarget));
    const retryBtn = createButton('↻', (e) => retryMessage(e.currentTarget));

    buttonContainer.appendChild(copyBtn);
    buttonContainer.appendChild(retryBtn);
  }

  return buttonContainer;
}

// 创建单个按钮
function createButton(symbol, onClick) {
  const btn = document.createElement('button');
  btn.textContent = symbol;
  btn.onclick = onClick;
  return btn;
}

// 显示 Tooltip
function showTooltip(target, message) {
  tooltip.textContent = message;
  const rect = target.getBoundingClientRect();
  tooltip.style.top = rect.top - 30 + window.scrollY + 'px';
  tooltip.style.left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2 + 'px';
  tooltip.style.opacity = 1;

  setTimeout(() => {
    tooltip.style.opacity = 0;
  }, 1500); // 1.5 秒后自动隐藏
}

// 修改复制函数，使用 Tooltip
function copyMessage(content, targetButton) {
  navigator.clipboard.writeText(content).then(() => {
    showTooltip(targetButton, "消息已复制！");
  }).catch(err => {
    console.error("复制失败: ", err);
    showTooltip(targetButton, "复制失败！");
  });
}


// 封装发送消息和接收回答的函数
async function sendEditedMessage(newContent, updateUI = true) {
  const userId = document.getElementById('userId').value.trim();
  const selectedApi = document.getElementById('apiSelect').value;
  const backendUrl = document.getElementById('backendUrl').value.trim();
  const sendBtn = document.getElementById('sendBtn');

  if (!userId || !newContent) return;

  sendBtn.disabled = true;
  sendBtn.style.backgroundColor = '#ccc';
  sendBtn.style.cursor = 'not-allowed';

  // 根据参数决定是否更新 UI 和 chatHistory
  if (updateUI) {
    chatHistory.push({ role: 'user', content: newContent });
    appendMessage('user', newContent);
  }
  saveCurrentSession();

  // ⚡ 在 config 中加入当前选中的模式
  const data = { 
    config: { 
      id: userId, 
      api: selectedApi, 
      chatMode: currentMode   // 当前模式
    }, 
    chat: chatHistory.slice() 
  };

  try {
    const response = await fetch(backendUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    streamAssistantReply(response, sendBtn, currentSessionId);
  } catch (err) {
    console.error('Fetch error:', err);
    sendBtn.disabled = false;
    sendBtn.style.backgroundColor = '';
    sendBtn.style.cursor = '';
  }
}

// 编辑消息函数
function editMessage(targetMsg) {
  if (!targetMsg) return;

  const wrapper = targetMsg.querySelector('.message-container');
  const msgContentDiv = wrapper.querySelector('.message-content');
  const oldContent = msgContentDiv.textContent;

  // 进入编辑状态
  targetMsg.classList.add('editing');

  // 替换为 textarea
  const textarea = document.createElement('textarea');
  textarea.className = 'edit-textarea';
  textarea.value = oldContent;
  textarea.rows = 10;
  msgContentDiv.replaceWith(textarea);

  const btnContainer = document.createElement('div');
  btnContainer.className = 'edit-buttons';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel';
  cancelBtn.textContent = '取消';
  cancelBtn.onclick = () => {
    textarea.replaceWith(msgContentDiv);
    btnContainer.remove();
    targetMsg.classList.remove('editing');
  };

  const sendBtn = document.createElement('button');
  sendBtn.textContent = '发送';
  sendBtn.onclick = async () => {
    const newContent = textarea.value;

    // 清空当前消息及之后的对话
    const msgList = Array.from(document.querySelectorAll('.message'));
    const targetIndex = msgList.indexOf(targetMsg);
    if (targetIndex >= 0) {
      const toRemove = msgList.slice(targetIndex);
      toRemove.forEach(msg => msg.remove());
      chatHistory = chatHistory.slice(0, targetIndex);
    }

    targetMsg.classList.remove('editing');
    await sendEditedMessage(newContent, true);
  };

  btnContainer.appendChild(cancelBtn);
  btnContainer.appendChild(sendBtn);

  // 按钮容器放到 wrapper 内
  wrapper.appendChild(btnContainer);
}

// 重试消息函数，参考 editMessage 逻辑
async function retryMessage(buttonElement) {
  // 确认函数执行
  //alert('执行 retryMessage');

  // 找到按钮所在的 .message
  const targetMsg = buttonElement.closest('.message');
  if (!targetMsg) {
    alert('未找到对应消息容器');
    return;
  }
  console.log('找到消息容器:', targetMsg);

  // 获取消息列表并找到目标索引
  const msgList = Array.from(document.querySelectorAll('.message'));
  const targetIndex = msgList.indexOf(targetMsg);
  if (targetIndex < 0) {
    alert('消息索引未找到');
    return;
  }

  // 删除目标消息及之后的所有消息
  const toRemove = msgList.slice(targetIndex);
  const removedContents = toRemove.map(m => m.querySelector('.message-content')?.textContent);
  toRemove.forEach(msg => msg.remove());
  chatHistory = chatHistory.slice(0, targetIndex);
  console.log('删除的消息内容:', removedContents);

  // 找到前一条用户消息
  let prevUserContent = null;
  for (let i = targetIndex - 1; i >= 0; i--) {
    if (msgList[i].classList.contains('user')) {
      prevUserContent = msgList[i].querySelector('.message-content')?.textContent;
      break;
    }
  }

  if (!prevUserContent) {
    alert('没有找到前一条用户消息，无法重试');
    return;
  }
  console.log('前一条用户消息:', prevUserContent);

  // 调用发送函数
  await sendEditedMessage(prevUserContent, false);
}

// 切换会话
function selectSession(btn) {
  const newSessionId = btn.dataset.sessionId;

  // 从按钮内的.session-name元素获取干净名称
  const nameElement = btn.querySelector('.session-name');
  const sessionName = nameElement ? nameElement.textContent : `会话 ${newSessionId}`;

  // 如果点击的是已选中的会话，直接触发重命名
  if (newSessionId === currentSessionId) {
    triggerRename(btn, nameElement, newSessionId);
    return;
  }

  // 切换会话
  document.querySelectorAll('.session-btn').forEach(b => {
    b.classList.remove('active');
  });

  btn.classList.add('active');
  currentSessionId = newSessionId;
  chatHistory = loadSessionFromStorage(currentSessionId);
  renderChat(chatHistory);

  document.getElementById('currentSessionTitle').textContent = '当前会话：' + sessionName;
  localStorage.setItem('lastSession', currentSessionId);
}

// 独立函数处理重命名逻辑
function triggerRename(btn, nameSpan, id) {
  const moreBtn = btn.querySelector('.menu-btn');

  const input = document.createElement('input');
  input.type = 'text';
  input.value = nameSpan.textContent;

  // 样式：避让右侧的 ⋮ 按钮
  const moreWidth = moreBtn.offsetWidth + 4; // 右侧间距
  input.style.width = `calc(100% - ${moreWidth}px)`;
  input.style.backgroundColor = 'transparent';
  input.style.border = 'none';
  input.style.borderRadius = '0';  // 不保留圆角
  input.style.padding = '0';       // 去掉内边距
  input.style.margin = '0';        // 去掉外边距
  input.style.boxSizing = 'border-box';
  input.style.outline = 'none';    // 去掉选中高亮
  input.style.boxShadow = 'none';  // 去掉阴影

  nameSpan.replaceWith(input);
  input.focus();

  const commit = () => {
    const val = input.value.trim();
    if (!val) return; // 空值不修改
    const allNames = Array.from(document.querySelectorAll('.session-name'))
      .filter(el => el !== nameSpan)
      .map(el => el.textContent);
    if (allNames.includes(val)) {
      // 使用 tooltip 提示重复
      showTooltip(input, '名称重复，请换一个！');
      input.focus();
      return;
    }

    nameSpan.textContent = val;

    const stored = localStorage.getItem('session_' + id);
    if (stored) {
      try {
        const data = JSON.parse(stored);
        data.name = val;
        localStorage.setItem('session_' + id, JSON.stringify(data));
      } catch {}
    }

    if (id === currentSessionId) {
      document.getElementById('currentSessionTitle').textContent = '当前会话：' + val;
    }

    input.replaceWith(nameSpan);
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') commit();
  });
}

// 查找当前最大会话编号
function findMaxSessionNumber() {
  let maxNumber = 0;
  
  // 遍历所有会话
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('session_')) {
      try {
        const sessionData = JSON.parse(localStorage.getItem(key));
        // 从会话名称中提取数字（如"会话 3" → 3）
        const match = sessionData.name.match(/会话 (\d+)/);
        if (match) {
          const currentNum = parseInt(match[1]);
          if (currentNum > maxNumber) {
            maxNumber = currentNum;
          }
        }
      } catch (e) {
        console.error("解析会话数据出错:", e);
      }
    }
  }
  
  return maxNumber;
}

// 查找空会话
function findEmptySessionInUI() {
  const buttons = document.getElementById('sessionList').querySelectorAll('button.session-btn');
  for (const btn of buttons) {
    const sid = btn.dataset.sessionId;
    const stored = localStorage.getItem('session_' + sid);
    if (!stored) {
      return btn; // UI 有但本地无 → 空会话
    }
    try {
      const sessionData = JSON.parse(stored);
      if (!sessionData.history || sessionData.history.length === 0) {
        return btn;
      }
    } catch (e) {
      console.error("解析会话数据出错:", e);
    }
  }
  return null;
}

// 统一创建：会话按钮 + ⋮ 按钮 + 菜单
function createSessionButton(name, id) {
  const wrap = document.createElement('div');
  wrap.className = 'session-item';

  // 主按钮
  const btn = document.createElement('button');
  btn.className = 'session-btn';
  btn.dataset.sessionId = id;
  
  // 文本部分 - 使用专门的元素
  const nameSpan = document.createElement('span');
  nameSpan.className = 'session-name';
  nameSpan.textContent = name; // 只包含纯名称
  
  // ⋮ 按钮 - 单独的元素
  const more = document.createElement('button');
  more.className = 'menu-btn';
  more.textContent = '⋮';
  more.style.display = 'none'; // 初始隐藏
  
  // 添加到按钮
  btn.appendChild(nameSpan);
  btn.appendChild(more);

  // 菜单
  const menu = document.createElement('div');
  menu.className = 'menu';
  menu.style.display = 'none';

  // “清空”菜单项
  const clearItem = document.createElement('div');
  clearItem.textContent = '清空';
  clearItem.className = 'clear-item';
  clearItem.onclick = (e) => {
    e.stopPropagation();
    chatHistory = [];
    renderChat(chatHistory);
    localStorage.removeItem('session_' + id);
	menu.style.display = 'none'; // 点击后隐藏菜单
  };

  // 删除菜单项
  const del = document.createElement('div');
  del.textContent = '删除';
  del.className = 'delete-item';
  del.onclick = (e) => {
    e.stopPropagation();
    localStorage.removeItem('session_' + id);
    const isCurrent = (id === currentSessionId);
    wrap.remove();
    if (isCurrent) createNewSession();
	menu.style.display = 'none'; // 点击后隐藏菜单
  };

  // 重命名菜单项
  const rename = document.createElement('div');
  rename.textContent = '重命名';
  rename.onclick = (e) => {
    e.stopPropagation();
    triggerRename(btn, nameSpan, id); // 使用统一函数处理重命名和重名检查
	menu.style.display = 'none'; // 点击后隐藏菜单
  };

  // 将菜单项添加到菜单
  menu.appendChild(del);
  menu.appendChild(clearItem);
  menu.appendChild(rename);

  wrap.appendChild(btn);
  wrap.appendChild(menu);

  // 点击事件处理
  btn.onclick = () => {
    selectSession(btn);
    menu.style.display = 'none';
  };

  // 鼠标悬停显示⋮按钮
  btn.addEventListener('mouseenter', () => {
    more.style.display = 'block';
  });
  btn.addEventListener('mouseleave', () => {
    if (menu.style.display !== 'block') {
      more.style.display = 'none';
    }
  });

  // ⋮按钮点击显示菜单
  more.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.menu').forEach(m => {
      if (m !== menu) m.style.display = 'none';
    });
    menu.style.display = 'block';
  });

  // 点击其他地方关闭菜单
  document.addEventListener('click', (e) => {
    if (!wrap.contains(e.target)) {
      menu.style.display = 'none';
      more.style.display = 'none';
    }
  });

  return wrap;
}

// 新建会话（修改后）
function createNewSession() {
  // 先检查 UI 是否已有空会话
  const emptyBtn = findEmptySessionInUI();
  if (emptyBtn) {
    selectSession(emptyBtn);
    return;
  }

  // 没有空会话 → 正常创建新会话
  //saveCurrentSession();
  const maxNumber = findMaxSessionNumber();
  const nextNumber = maxNumber + 1;

  const newId = Date.now().toString();
  const sessionName = `会话 ${nextNumber}`;
  currentSessionId = newId;
  chatHistory = [];

  // 更新UI（不保存到本地存储）—— 使用统一创建函数
  const item = createSessionButton(sessionName, newId);
  document.getElementById('sessionList').prepend(item);

  // 设置新会话为active状态
  const newBtn = item.querySelector('.session-btn');
  if (newBtn) {
    // 先移除其他按钮的active状态
    document.querySelectorAll('.session-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    newBtn.classList.add('active');
  }

  document.getElementById('currentSessionTitle').textContent = `当前会话：${sessionName}`;
  renderChat(chatHistory);

  localStorage.setItem('lastSession', newId);
}

  chatHistory = [];
  renderChat(chatHistory);
  
  // 从本地存储中删除空会话

// 清空所有历史会话
function clearAllSessions(confirmed = false) {
  if (!confirmed) {
    // 如果没有确认，直接返回
    return;
  }
  
  // 收集并删除所有会话
  const keysToRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('session_')) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(key => localStorage.removeItem(key));
  
  // 清空UI列表
  document.getElementById('sessionList').innerHTML = '';
  
  // 创建新会话（使用统一的createSessionButton函数）
  const newId = Date.now().toString();
  const sessionName = "会话 1";
  currentSessionId = newId;
  chatHistory = [];
  
  // 使用新版会话按钮创建方式
  const sessionItem = createSessionButton(sessionName, newId);
  document.getElementById('sessionList').appendChild(sessionItem);
  
  // 设置新会话为active状态
  const newBtn = sessionItem.querySelector('.session-btn');
  if (newBtn) {
    newBtn.classList.add('active');
  }
  
  // 更新当前会话标题
  document.getElementById('currentSessionTitle').textContent = `当前会话：${sessionName}`;
  renderChat(chatHistory);
  
  // 设置最后活动会话
  localStorage.setItem('lastSession', newId);
}

function handleClearAllSessions(event) {
  event.stopPropagation(); // 防止冒泡到会话菜单
  if (confirm('确定要清空所有历史会话吗？')) {

}

// 修改后的 loadAllSessions
function loadAllSessions() {
  const sessionList = document.getElementById('sessionList');
  sessionList.innerHTML = '';
  
  let sessions = [];
  let maxNumber = 0;
  
  // 加载并计算最大编号
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('session_')) {
      try {
        const stored = localStorage.getItem(key);
        const sessionData = JSON.parse(stored);
        
        // 清洗会话名称
        if (sessionData.name) {
          sessionData.name = sessionData.name.replace(/[⋮⋯]/g, '').trim();
        }
        
        // 只加载有内容的会话
        if (sessionData.history && sessionData.history.length > 0) {
          sessions.push(sessionData);
          
          // 从清洗后的名称中提取数字
          const match = sessionData.name.match(/会话 (\d+)/);
          if (match) maxNumber = Math.max(maxNumber, parseInt(match[1]));
        } else {
          // 删除空会话
          localStorage.removeItem(key);
        }
      } catch (e) {
        console.error('解析会话数据出错:', e);
      }
    }
  }
  
  // 按时间排序并渲染
  sessions.sort((a, b) => b.updatedAt - a.updatedAt);
  
  // 如果没有会话，创建一个新的（不保存到本地存储）
  if (sessions.length === 0) {
    createNewSession();
    return maxNumber;
  }
  
  // 渲染会话按钮
  sessions.forEach(session => {
    // 确保名称是干净的
    const cleanName = session.name || `会话 ${++maxNumber}`;
    const item = createSessionButton(cleanName, session.id);
    sessionList.appendChild(item);
  });
  
  // 恢复上次会话或选择第一个会话
  const lastSessionId = localStorage.getItem('lastSession');
  if (lastSessionId && sessions.some(s => s.id === lastSessionId)) {
    const btn = sessionList.querySelector(`button.session-btn[data-session-id="${lastSessionId}"]`);
    if (btn) {
	  btn.classList.add('active'); // 添加这行
	  selectSession(btn);
	  }
  } else if (sessions.length > 0) {
    const firstBtn = sessionList.querySelector('button.session-btn');
    if (firstBtn) {
	  firstBtn.classList.add('active'); // 添加这行
	  selectSession(firstBtn);
	  }
  }
  updateSessionListOrder()
  return maxNumber;
}

// 流式处理助手与用户消息
function streamAssistantReply(response, sendBtn, currentSessionId) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder("utf-8");
  const canvas = document.getElementById('chatCanvas');

  /*// Assistant 容器
  const assistantMsg = document.createElement('div');
  assistantMsg.className = 'message assistant';
  const assistantWrapper = document.createElement('div');
  assistantWrapper.className = 'message-container';
  const assistantLabel = document.createElement('div');
  assistantLabel.className = 'role-label';
  assistantLabel.textContent = "Assistant";
  const assistantContent = document.createElement('div');
  assistantContent.className = 'message-content';
  assistantWrapper.appendChild(assistantLabel);
  assistantWrapper.appendChild(assistantContent);
  const assistantButton = createButtonContainer('assistant', '');
  assistantWrapper.appendChild(assistantButton);
  assistantMsg.appendChild(assistantWrapper);
  canvas.appendChild(assistantMsg);
  canvas.scrollTop = canvas.scrollHeight;*/

  // 用户消息容器（动态创建）
  let userMsg, userContent;
  let userBuffer = "";

  let assistantBuffer = "";
  let isStreamEnded = false;

  function endStream() {
    if (isStreamEnded) return;
    isStreamEnded = true;

    if (!assistantBuffer) {
      assistantBuffer = "⚠️ Assistant 未返回内容或发生错误";
    }
    assistantWrapper.querySelector('.button-container')?.remove();
    assistantWrapper.appendChild(createButtonContainer('assistant', assistantBuffer));

    chatHistory.push({ role: 'assistant', content: assistantBuffer });
    saveCurrentSession();

    sendBtn.disabled = false;
    sendBtn.style.backgroundColor = '';
    sendBtn.style.cursor = '';
  }

  let currentRole = null;           // 当前正在流式的角色
  let currentBuffer = "";           // 当前角色消息缓冲
  let currentContentDiv = null;     // 当前角色 DOM 容器

  function readChunk({ done, value }) {
    if (done) return;
  
    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n').filter(line => line.trim());
  
    for (const line of lines) {
      try {
        const jsonObj = JSON.parse(line);
  
        if (jsonObj.type === 'assistant' || jsonObj.type === 'user') {
          // 检查是否切换角色
          if (currentRole !== jsonObj.type) {
            // 保存前一个角色 buffer 到 chatHistory
            if (currentRole && currentBuffer) {
              chatHistory.push({ role: currentRole, content: currentBuffer });
              saveCurrentSession();
            }
  
            // 创建新的 DOM 容器
            currentRole = jsonObj.type;
            currentBuffer = "";
            const msg = document.createElement('div');
            msg.className = 'message ' + currentRole;
  
            const wrapper = document.createElement('div');
            wrapper.className = 'message-container';
  
            const label = document.createElement('div');
            label.className = 'role-label';
            label.textContent = currentRole.charAt(0).toUpperCase() + currentRole.slice(1);
  
            currentContentDiv = document.createElement('div');
            currentContentDiv.className = 'message-content';
  
            wrapper.appendChild(label);
            wrapper.appendChild(currentContentDiv);
            wrapper.appendChild(createButtonContainer(currentRole, ''));
            msg.appendChild(wrapper);
            canvas.appendChild(msg);
            canvas.scrollTop = canvas.scrollHeight;
          }
  
          // 拼接流式内容
          currentBuffer += jsonObj.content;
          currentContentDiv.innerHTML = marked.parse(currentBuffer);
          canvas.scrollTop = canvas.scrollHeight;
        } else if (jsonObj.type === 'done' || jsonObj.type === 'allDone') {
          // 保存当前角色 buffer
          if (currentRole && currentBuffer) {
            chatHistory.push({ role: currentRole, content: currentBuffer });
            saveCurrentSession();
          }
          currentBuffer = "";
          currentContentDiv = null;
          currentRole = null;
        
          // 按钮恢复逻辑
          if (currentMode === "自动对话") {
            if (jsonObj.type === 'allDone') {
              sendBtn.disabled = false;
              sendBtn.style.backgroundColor = '';
              sendBtn.style.cursor = '';
              showTooltip(sendBtn, "恢复按钮");
            }
          } else {
            // 普通模式下 done/allDone 都恢复
            sendBtn.disabled = false;
            sendBtn.style.backgroundColor = '';
            sendBtn.style.cursor = '';
            showTooltip(sendBtn, "恢复按钮");
          }
        } else if (jsonObj.type === 'error') {
          if (currentContentDiv) currentContentDiv.textContent += `⚠️ 错误: ${jsonObj.message}`;
        }
      } catch {
        if (currentContentDiv) currentContentDiv.textContent += line;
      }
    }
  
    return reader.read().then(readChunk);
  }

  reader.read().then(readChunk).catch(err => {
    assistantBuffer = `⚠️ 流读取失败: ${err.message}`;
    assistantContent.textContent = assistantBuffer;
    endStream();
  });
}


// 发送消息
async function sendMessage() {
  const userId = document.getElementById('userId').value.trim();
  const userInput = document.getElementById('userInput').value.trim();
  const selectedApi = document.getElementById('apiSelect').value;
  const backendUrl = document.getElementById('backendUrl').value.trim();
  const sendBtn = document.getElementById('sendBtn');

  if (!userId || !userInput) return;

  sendBtn.disabled = true;
  sendBtn.style.backgroundColor = '#ccc';
  sendBtn.style.cursor = 'not-allowed';

  chatHistory.push({ role: 'user', content: userInput });
  appendMessage('user', userInput);
  document.getElementById('userInput').value = '';
  autoResize(document.getElementById('userInput'));
  saveCurrentSession();

  // ⚡ 在 config 里加入当前选中的模式
  const data = { 
    config: { 
      id: userId, 
      api: selectedApi, 
      chatMode: currentMode   // 当前模式
    }, 
    chat: chatHistory.slice() 
  };

  try {
    const response = await fetch(backendUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    streamAssistantReply(response, sendBtn, currentSessionId);
  } catch (err) {
    console.error('Fetch error:', err);
    sendBtn.disabled = false;
    sendBtn.style.backgroundColor = '';
    sendBtn.style.cursor = '';
  }
}


// 获取IP
fetch('https://api.ipify.org?format=json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('userId').value = data.ip;
  })
  .catch(err => {
    console.error('IP fetch error:', err);
    document.getElementById('userId').placeholder = 'Enter your ID';
  });

document.getElementById('newSessionBtn').addEventListener('click', createNewSession);
document.getElementById('clearCurrentBtn').addEventListener('click', clearCurrentSession);
document.getElementById('clearAllBtn').addEventListener('click', handleClearAllSessions);

// 初始化
window.onload = () => {
  loadAllSessions();
};
